spring:
  application:
    name: networking2


  datasource:
    url: jdbc:mysql://localhost:3306/cotato
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  server:
      port: 8080