spring:
  application:
    name: networking2


  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/cotato
    username: ${DB_USER}
    password: ${DB_PASS}




  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  server:
      port: 8080