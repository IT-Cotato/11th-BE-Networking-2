spring:
  config.activate.on-profile: test
  application:
    name: networking2

  datasource:
    url: jdbc:h2:tcp://localhost/~/test
    username: SA
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
